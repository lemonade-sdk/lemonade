services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-localhost
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus.localhost.yml:/etc/prometheus/prometheus.yml
      - prometheus_localhost_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-localhost
    ports:
      - "3000:3000"
    volumes:
      - grafana_localhost_data:/var/lib/grafana

volumes:
  prometheus_localhost_data:
  grafana_localhost_data:
