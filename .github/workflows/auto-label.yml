name: Auto-label issues and PRs

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]
  workflow_dispatch:
    inputs:
      target:
        description: "Issue/PR number to label (leave blank to backfill all unlabeled open items)"
        required: false
        type: string
      dry_run:
        description: "Log decisions without applying labels (recommended for spot-testing)"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    concurrency:
      group: auto-label-${{ github.event.issue.number || github.event.pull_request.number || inputs.target || 'backfill' }}
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve items and dry-run flag
        id: resolve
        run: |
          set -euo pipefail
          case "${{ github.event_name }}" in
            issues)
              echo "items=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
              echo "dry_run=false" >> "$GITHUB_OUTPUT"
              ;;
            pull_request_target)
              echo "items=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
              echo "dry_run=false" >> "$GITHUB_OUTPUT"
              ;;
            workflow_dispatch)
              if [ -n "${{ inputs.target }}" ]; then
                echo "items=${{ inputs.target }}" >> "$GITHUB_OUTPUT"
              else
                ISSUES=$(gh issue list --state open --limit 500 --json number,labels \
                  --jq '[.[] | select((.labels | map(.name) | any(startswith("engine::") or startswith("area::"))) | not) | .number] | join(" ")')
                PRS=$(gh pr list --state open --limit 500 --json number,labels \
                  --jq '[.[] | select((.labels | map(.name) | any(startswith("engine::") or startswith("area::"))) | not) | .number] | join(" ")')
                ITEMS=$(echo "$ISSUES $PRS" | xargs)
                echo "items=$ITEMS" >> "$GITHUB_OUTPUT"
              fi
              echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run auto-labeler
        run: |
          set -euo pipefail
          ITEMS="${{ steps.resolve.outputs.items }}"
          if [ -z "$ITEMS" ]; then
            echo "No items to label."
            exit 0
          fi
          if [ "${{ steps.resolve.outputs.dry_run }}" = "true" ]; then
            python .github/scripts/auto_label.py $ITEMS --dry-run
          else
            python .github/scripts/auto_label.py $ITEMS
          fi
