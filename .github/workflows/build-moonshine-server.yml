name: Build moonshine-server 🛠️

# Builds the self-contained moonshine-server bundles that lemonade's
# "moonshine" backend downloads (see MoonshineServer::get_install_params).
#
# SELF-CONTAINED POLICY (per PR #2115 review)
# -------------------------------------------
# The moonshine backend must NOT rely on a system-wide Python installation —
# the same constraint that applies to vLLM. Each asset here is a PyInstaller
# onedir bundle of tools/moonshine-server/main.py with its own embedded Python
# runtime and the moonshine-voice native libraries, so nothing is required (or
# touched) on the host. PYTHONNOUSERSITE is additionally set by lemonade at
# launch as a belt-and-braces isolation measure.
#
# PLATFORM MATRIX
# ---------------
# moonshine-voice publishes wheels for: Windows x64, Linux x64/aarch64, and
# macOS arm64 (no Intel macOS, no universal2). The assets are named exactly as
# MoonshineServer::get_install_params() expects:
#   moonshine-server-<version>-linux-x64.tar.gz
#   moonshine-server-<version>-windows-x64.zip
#   moonshine-server-<version>-macos-arm64.tar.gz
# and are published as a release on lemonade-sdk/moonshine-server with the tag
# equal to the pinned version in src/cpp/resources/backend_versions.json
# (moonshine.cpu, currently moonshine0.1.0).
#
# Python is pinned to 3.12: main.py uses the `cgi` module, which was removed
# from the standard library in Python 3.13.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag / version to publish (must match backend_versions.json moonshine.cpu)'
        required: true
        default: 'moonshine0.1.0'
      moonshine_voice_version:
        description: 'moonshine-voice PyPI version to bundle (empty = latest)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-moonshine-server:
    name: Build moonshine-server (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x64
            archive: tar.gz
          - os: windows-latest
            platform: windows-x64
            archive: zip
          - os: macos-latest
            platform: macos-arm64
            archive: tar.gz

    env:
      VERSION: ${{ github.event.inputs.version }}
      MOONSHINE_VOICE_VERSION: ${{ github.event.inputs.moonshine_voice_version }}

    steps:
      - name: Checkout lemonade
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          if [ -n "$MOONSHINE_VOICE_VERSION" ]; then
            python -m pip install "moonshine-voice==$MOONSHINE_VOICE_VERSION"
          else
            python -m pip install moonshine-voice
          fi
          python -m pip install websockets pyinstaller
          python -c "import moonshine_voice; print(moonshine_voice.__file__)"

      - name: Build self-contained bundle (PyInstaller onedir)
        shell: bash
        run: |
          set -euxo pipefail
          # --collect-all pulls in moonshine_voice's native shared libraries and
          # data files; websockets is imported lazily so declare it explicitly.
          pyinstaller --noconfirm --onedir --name moonshine-server \
            --collect-all moonshine_voice \
            --hidden-import websockets \
            tools/moonshine-server/main.py

      - name: Smoke test bundle
        shell: bash
        run: |
          set -euxo pipefail
          ./dist/moonshine-server/moonshine-server --help

      - name: Package asset (name must match get_install_params)
        id: package
        shell: bash
        run: |
          set -euxo pipefail
          ASSET="moonshine-server-${VERSION}-${{ matrix.platform }}.${{ matrix.archive }}"
          cd dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "../$ASSET" moonshine-server
          else
            tar -czf "../$ASSET" moonshine-server
          fi
          cd ..
          ls -lh "$ASSET"
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"

      - name: Publish to lemonade-sdk/moonshine-server
        shell: bash
        env:
          # TODO(operator): GITHUB_TOKEN cannot write to a different repo. Create
          # the lemonade-sdk/moonshine-server repo and provide a PAT (or
          # fine-grained token) with `contents:write` on it as a secret, e.g.
          # MOONSHINE_BUILDS_TOKEN.
          GH_TOKEN: ${{ secrets.MOONSHINE_BUILDS_TOKEN }}
        run: |
          set -euxo pipefail
          ASSET="${{ steps.package.outputs.asset }}"
          REPO="lemonade-sdk/moonshine-server"
          # Create the release if it does not exist yet, then upload (clobber so
          # re-runs replace the asset). Tag == pinned version in backend_versions.json.
          if ! gh release view "$VERSION" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$VERSION" --repo "$REPO" \
              --title "moonshine-server $VERSION" \
              --notes "Self-contained moonshine-server bundles (PyInstaller, embedded Python 3.12 + moonshine-voice). Built from lemonade tools/moonshine-server by the build-moonshine-server workflow." \
              || true  # another matrix job may have created it concurrently
          fi
          gh release upload "$VERSION" "$ASSET" --repo "$REPO" --clobber
