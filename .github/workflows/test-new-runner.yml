name: Test New Runner on Windows
permissions:
  contents: read

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner to use'
        required: true
        type: choice
        options:
          - test
        default: 'test'

jobs:
  test-runner:
    runs-on: ${{ inputs.runner || 'test' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show runner information
        run: |
          echo "Hello from the runner!"
          echo "Runner name: ${{ runner.name }}"
          echo "Runner OS: ${{ runner.os }}"
          echo "Runner arch: ${{ runner.arch }}"
          hostname

      - name: Install Lemonade
        run: |
          curl -L -o lemonade.msi https://github.com/lemonade-sdk/lemonade/releases/latest/download/lemonade.msi
          msiexec /i lemonade.msi /qn
        shell: bash

      - name: Run simple Lemonade test
        run: lemonade-server --help
