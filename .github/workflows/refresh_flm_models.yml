name: Refresh flm_models.json

# Regenerates src/cpp/resources/flm_models.json from `flm list --json` against
# the FLM version pinned in src/cpp/resources/backend_versions.json. Runs:
#   - manually via the Actions UI (workflow_dispatch)
#   - automatically when backend_versions.json is touched on a push or PR
#
# On push, opens a PR with the refreshed snapshot. On PR, fails with instructions
# so the contributor regenerates the snapshot themselves rather than us
# auto-committing into their branch.

on:
  workflow_dispatch:
  push:
    paths:
      - "src/cpp/resources/backend_versions.json"
  pull_request:
    paths:
      - "src/cpp/resources/backend_versions.json"

jobs:
  refresh:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Read pinned FLM version
        id: flm
        run: |
          FLM_VERSION=$(jq -r '.flm.npu' src/cpp/resources/backend_versions.json)
          FLM_VERSION_NUM=$(echo "$FLM_VERSION" | sed 's/^v//')
          echo "version=$FLM_VERSION" >> "$GITHUB_OUTPUT"
          echo "version_num=$FLM_VERSION_NUM" >> "$GITHUB_OUTPUT"

      - name: Install FLM ${{ steps.flm.outputs.version }}
        run: |
          set -e
          curl -L -o /tmp/fastflowlm.deb "https://github.com/FastFlowLM/FastFlowLM/releases/download/${{ steps.flm.outputs.version }}/fastflowlm_${{ steps.flm.outputs.version_num }}_ubuntu24.04_amd64.deb"
          mkdir -p /tmp/flm-extract
          dpkg-deb -x /tmp/fastflowlm.deb /tmp/flm-extract
          FLM_BIN=$(find /tmp/flm-extract -name flm -type f | head -1)
          chmod +x "$FLM_BIN"
          echo "$(dirname "$FLM_BIN")" >> "$GITHUB_PATH"
          rm /tmp/fastflowlm.deb

      - name: Generate flm_models.json
        run: |
          python3 tools/generate_flm_models.py --version "${{ steps.flm.outputs.version }}"

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet src/cpp/resources/flm_models.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "flm_models.json is already up to date for FLM ${{ steps.flm.outputs.version }}."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "flm_models.json has changed. Diff:"
            git --no-pager diff src/cpp/resources/flm_models.json | head -200 || true
          fi

      - name: Fail PR if snapshot is stale
        if: github.event_name == 'pull_request' && steps.diff.outputs.changed == 'true'
        run: |
          echo "::error::backend_versions.json was modified but src/cpp/resources/flm_models.json is out of date for FLM ${{ steps.flm.outputs.version }}. Run 'python3 tools/generate_flm_models.py' locally and commit the result."
          exit 1

      - name: Open PR with refreshed snapshot
        if: github.event_name != 'pull_request' && steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Refresh flm_models.json for FLM ${{ steps.flm.outputs.version }}"
          title: "Refresh flm_models.json for FLM ${{ steps.flm.outputs.version }}"
          body: |
            Auto-generated by `.github/workflows/refresh_flm_models.yml`.

            FLM version: `${{ steps.flm.outputs.version }}` (pinned in `src/cpp/resources/backend_versions.json`).

            Re-run via the Actions UI (`workflow_dispatch`) or by bumping the FLM pin in `backend_versions.json`.
          branch: refresh-flm-models/${{ steps.flm.outputs.version }}
          add-paths: src/cpp/resources/flm_models.json
          delete-branch: true
