name: 'Install Lemonade Server (.pkg)'
description: 'Downloads and installs Lemonade Server from a .pkg, then verifies installation'
inputs:
  version:
    description: 'Version string for the package (e.g., 9.3.1)'
    required: true
  artifact-name:
    description: 'Name of the artifact to download'
    required: false
    default: 'lemonade-macos-pkg'
  download-artifact:
    description: 'Whether to download the artifact (set to false if already downloaded)'
    required: false
    default: 'true'

outputs:
  bin-path:
    description: 'Path to the installed binaries directory'
    value: ${{ steps.install.outputs.bin-path }}

runs:
  using: "composite"
  steps:
    - name: Download .pkg package
      if: ${{ inputs.download-artifact == 'true' }}
      uses: actions/download-artifact@v7
      with:
        name: ${{ inputs.artifact-name }}
        path: .

    - name: Install .pkg
      id: install
      shell: bash
      run: |
        set -e

        echo "Looking for .pkg file..."

        PKG_FILE=$(find . -maxdepth 1 -name "*.pkg" -type f | head -1)

        if [ -z "$PKG_FILE" ]; then
            echo "ERROR: No .pkg file found in current directory!"
            ls -la
            exit 1
        fi

        echo "Installing: $PKG_FILE"
        sudo installer -pkg "$PKG_FILE" -target /
        echo "Installation complete"

        # Binaries are installed at /usr/local/bin
        BIN_PATH="/usr/local/bin"
        echo "$BIN_PATH" >> $GITHUB_PATH
        echo "bin-path=$BIN_PATH" >> $GITHUB_OUTPUT

        echo "Binaries at: $BIN_PATH"

    - name: Verify installation
      shell: bash
      run: |
        set -e

        BIN_PATH="${{ steps.install.outputs.bin-path }}"
        echo "Verifying installation at: $BIN_PATH"

        if [ -x "$BIN_PATH/lemonade-server" ]; then
            echo "Found: lemonade-server"
            "$BIN_PATH/lemonade-server" --version
        else
            echo "ERROR: lemonade-server not found at $BIN_PATH"
            exit 1
        fi

        if [ -x "$BIN_PATH/lemond" ]; then
            echo "Found: lemond"
            "$BIN_PATH/lemond" --version
        else
            echo "WARNING: lemond not found at $BIN_PATH"
        fi

        echo "Installation verification complete!"

    - name: Wait for server to be ready
      shell: bash
      run: |
        BIN_PATH="${{ steps.install.outputs.bin-path }}"
        LOG_FILE="${RUNNER_TEMP:-/tmp}/lemonade-server.log"

        # Always stop any launchd-managed lemond and start it ourselves so it
        # inherits the caller's HF_HOME. The .pkg installs a launchd plist that
        # hardcodes HF_HOME=/Library/Application Support/lemonade; if launchd
        # wins the startup race, downloads land in that path instead of the
        # workflow's HF_HOME, and tests that assert on the on-disk HF cache
        # root (e.g. test_014_delete_preserves_cross_repo_dependency) fail
        # non-deterministically.
        echo "Stopping launchd-managed lemond so we can start it manually..."
        # The .pkg's postinst-full-mac installs the daemon at this exact path
        # (see src/cpp/postinst-full-mac). macos-latest is macOS 15, which
        # supports `bootout`. Disable the service so launchd cannot respawn
        # it during the wait loop, then bootout to stop the running instance.
        sudo launchctl disable system/com.lemonade.server || true
        sudo launchctl bootout system /Library/LaunchDaemons/com.lemonade.server.plist || true
        sudo pkill -9 -f "lemond" 2>/dev/null || true
        sleep 2

        # Confirm nothing is still bound to 13305 before we start.
        if lsof -nP -iTCP:13305 -sTCP:LISTEN 2>/dev/null; then
          echo "WARNING: something still listening on 13305 after kill — killing again"
          sudo pkill -9 -f "lemond" 2>/dev/null || true
          sleep 2
        fi

        # Start lemond directly (pure HTTP server, no tray, no ambiguity about
        # subcommand flags) so HF_HOME from the workflow env is inherited.
        echo "Starting lemond manually with HF_HOME=$HF_HOME ..."
        rm -f "$LOG_FILE"
        nohup "$BIN_PATH/lemond" > "$LOG_FILE" 2>&1 &
        LEMOND_PID=$!
        echo "lemond PID: $LEMOND_PID"

        for i in $(seq 1 30); do
          if curl -sf http://localhost:13305/live > /dev/null 2>&1; then
            echo "Server is running and healthy (started manually)"
            exit 0
          fi
          if ! kill -0 "$LEMOND_PID" 2>/dev/null; then
            echo "ERROR: lemond process exited prematurely"
            cat "$LOG_FILE" 2>/dev/null || true
            exit 1
          fi
          echo "Waiting for server... ($i/30)"
          sleep 2
        done
        echo "ERROR: Server did not start within 60 seconds"
        echo "--- lemond log ---"
        cat "$LOG_FILE" 2>/dev/null || true
        echo "--- ps ---"
        ps aux | grep -i lemon || true
        echo "--- listeners on 13305 ---"
        lsof -nP -iTCP:13305 2>/dev/null || true
        exit 1
