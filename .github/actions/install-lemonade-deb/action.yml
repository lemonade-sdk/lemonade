name: 'Install Lemonade (.deb)'
description: 'Downloads and extracts Lemonade .deb package, then verifies installation'
inputs:
  version:
    description: 'Version string for the .deb package (e.g., 0.5.0)'
    required: true
  artifact-name:
    description: 'Name of the artifact to download'
    required: false
    default: 'lemonade-deb'
  extract-path:
    description: 'Path where the .deb should be extracted'
    required: false
    default: './deb-extract'
  download-artifact:
    description: 'Whether to download the artifact (set to false if already downloaded)'
    required: false
    default: 'true'

outputs:
  bin-path:
    description: 'Path to the extracted binaries directory'
    value: ${{ steps.extract.outputs.bin-path }}

runs:
  using: "composite"
  steps:
    - name: Download .deb package
      if: ${{ inputs.download-artifact == 'true' }}
      uses: actions/download-artifact@v7
      with:
        name: ${{ inputs.artifact-name }}
        path: .

    - name: Extract .deb package
      id: extract
      shell: bash
      run: |
        set -e

        VERSION="${{ inputs.version }}"
        EXTRACT_PATH="${{ inputs.extract-path }}"

        # Try to find the .deb file - it may have ~24.04 suffix from dpkg-buildpackage
        DEB_FILE=$(ls lemonade-server_${VERSION}*_amd64.deb 2>/dev/null | head -n1)

        if [ -z "$DEB_FILE" ]; then
            echo "ERROR: .deb file not found matching pattern: lemonade-server_${VERSION}*_amd64.deb"
            ls -la *.deb 2>/dev/null || echo "No .deb files found in current directory"
            exit 1
        fi

        echo "Extracting .deb package: $DEB_FILE"

        add_runtime_library_path() {
            local dep_root="$1"
            local paths=()
            local candidate

            for candidate in \
                "$dep_root/lib" \
                "$dep_root/usr/lib" \
                "$dep_root/lib/x86_64-linux-gnu" \
                "$dep_root/usr/lib/x86_64-linux-gnu"; do
                if [ -d "$candidate" ]; then
                    paths+=("$(pwd)/$candidate")
                fi
            done

            if [ "${#paths[@]}" -gt 0 ]; then
                local joined
                joined=$(IFS=:; echo "${paths[*]}")
                export LD_LIBRARY_PATH="${joined}${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
                echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH" >> "$GITHUB_ENV"
                echo "Added local runtime dependency library paths: $joined"
            fi
        }

        dep_name_from_expr() {
            # Strip version constraints and architecture/profile qualifiers from one
            # dependency alternative, then print the package name.
            echo "$1" \
                | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//' \
                | sed -E 's/[[:space:]]*\([^)]*\)//g; s/[[:space:]]*\[[^]]*\]//g; s/[[:space:]]*<[^>]*>//g' \
                | awk '{print $1}'
        }

        extract_runtime_deps_locally() {
            local dep_string="$1"
            local dep_root="$EXTRACT_PATH/.deb-runtime-deps"
            local download_dir="$EXTRACT_PATH/.deb-runtime-downloads"
            local dep_expr alt pkg selected dep_deb

            if ! command -v apt-get >/dev/null 2>&1 || ! command -v dpkg-query >/dev/null 2>&1; then
                echo "ERROR: Cannot install or locally extract .deb runtime dependencies: apt-get/dpkg-query missing."
                exit 1
            fi

            mkdir -p "$dep_root" "$download_dir"

            echo "No root/passwordless sudo available; locally extracting missing .deb runtime dependencies."
            echo "This mirrors the package dependency metadata for this extract-only CI action."

            while IFS= read -r dep_expr; do
                dep_expr=$(echo "$dep_expr" | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')
                [ -z "$dep_expr" ] && continue

                selected=""
                IFS='|' read -ra alternatives <<< "$dep_expr"
                for alt in "${alternatives[@]}"; do
                    pkg=$(dep_name_from_expr "$alt")
                    [ -z "$pkg" ] && continue
                    if dpkg-query -W -f='${Status}' "$pkg" 2>/dev/null | grep -q "install ok installed"; then
                        selected="$pkg"
                        break
                    fi
                    if [ -z "$selected" ]; then
                        selected="$pkg"
                    fi
                done

                [ -z "$selected" ] && continue
                if dpkg-query -W -f='${Status}' "$selected" 2>/dev/null | grep -q "install ok installed"; then
                    echo "Runtime dependency already installed: $selected"
                    continue
                fi

                echo "Downloading missing runtime dependency: $selected"
                (cd "$download_dir" && apt-get download "$selected")
            done < <(echo "$dep_string" | tr ',' '\n')

            shopt -s nullglob
            for dep_deb in "$download_dir"/*.deb; do
                echo "Extracting runtime dependency locally: $(basename "$dep_deb")"
                dpkg-deb -x "$dep_deb" "$dep_root"
            done
            shopt -u nullglob

            add_runtime_library_path "$dep_root"
        }

        install_runtime_deps() {
            local dep_string="$1"
            [ -z "$dep_string" ] && return 0

            echo "Resolving .deb runtime dependencies: $dep_string"

            if [ "$(id -u)" -eq 0 ]; then
                apt-get update
                apt-get satisfy -y "$dep_string"
                return 0
            fi

            if command -v sudo >/dev/null 2>&1 && sudo -n true >/dev/null 2>&1; then
                sudo apt-get update
                sudo apt-get satisfy -y "$dep_string"
                return 0
            fi

            extract_runtime_deps_locally "$dep_string"
        }

        # This action intentionally extracts the .deb into a test directory rather than
        # installing it system-wide, because downstream test jobs run the staged binary
        # directly. Respect the package's real Depends metadata before executing it.
        DEB_DEPENDS=$(dpkg-deb -f "$DEB_FILE" Depends 2>/dev/null || true)
        install_runtime_deps "$DEB_DEPENDS"

        # Extract the .deb package
        mkdir -p "$EXTRACT_PATH"
        dpkg-deb -x "$DEB_FILE" "$EXTRACT_PATH"

        # Copy resources to user's local share (path_utils.cpp checks here)
        mkdir -p ~/.local/share/lemonade-server
        cp -r "$EXTRACT_PATH/usr/share/lemonade-server/"* ~/.local/share/lemonade-server/

        # Make llama directory writable for backend downloads
        mkdir -p "$EXTRACT_PATH/usr/share/lemonade-server/llama"
        chmod 777 "$EXTRACT_PATH/usr/share/lemonade-server/llama"

        # Make binaries executable
        chmod +x "$EXTRACT_PATH/usr/bin/lemond"
        chmod +x "$EXTRACT_PATH/usr/bin/lemonade" 2>/dev/null || true

        # Add binaries to PATH for subsequent steps
        BIN_PATH="$(pwd)/$EXTRACT_PATH/usr/bin"
        echo "$BIN_PATH" >> $GITHUB_PATH
        echo "bin-path=$BIN_PATH" >> $GITHUB_OUTPUT

        echo "Package extracted successfully to: $EXTRACT_PATH"
        echo "Binaries available at: $BIN_PATH"

    - name: Verify binaries work
      shell: bash
      run: |
        set -e

        EXTRACT_PATH="${{ inputs.extract-path }}"

        echo "Verifying binaries..."

        # Test version commands
        "$EXTRACT_PATH/usr/bin/lemond" --version
        "$EXTRACT_PATH/usr/bin/lemonade" --version

        echo "Binaries verified successfully!"

    - name: Start server and wait for ready
      shell: bash
      run: |
        # The .deb extract doesn't install a systemd service, so start manually.
        # lemond logs to stdout (SinkCout), so redirect to a file for
        # the capture-server-logs action to find.
        EXTRACT_PATH="${{ inputs.extract-path }}"
        SERVER_BIN="$EXTRACT_PATH/usr/bin/lemond"
        CACHE_DIR="./"
        LOG_FILE="$RUNNER_TEMP/lemonade-server.log"

        echo "Starting lemonade server with cache dir $CACHE_DIR (logging to $LOG_FILE)..."
        mkdir -p "$RUNNER_TEMP/xdg-runtime"
        chmod 700 "$RUNNER_TEMP/xdg-runtime"
        echo "XDG_RUNTIME_DIR=$RUNNER_TEMP/xdg-runtime" >> "$GITHUB_ENV"
        export XDG_RUNTIME_DIR="$RUNNER_TEMP/xdg-runtime"
        "$SERVER_BIN" "$CACHE_DIR" > "$LOG_FILE" 2>&1 &
        SERVER_PID=$!

        echo "Waiting for server to be ready (PID $SERVER_PID)..."
        for i in $(seq 1 30); do
          if curl -sf http://127.0.0.1:13305/live > /dev/null 2>&1; then
            echo "Server is running and healthy"
            exit 0
          fi
          # Check if process is still alive
          if ! kill -0 $SERVER_PID 2>/dev/null; then
            echo "ERROR: Server process (PID $SERVER_PID) exited prematurely"
            echo "=== Server log ==="
            cat "$LOG_FILE" 2>/dev/null || echo "(no log file)"
            exit 1
          fi
          echo "Waiting for server... ($i/30)"
          sleep 2
        done
        echo "ERROR: Server did not start within 60 seconds"
        echo "=== Server log (last 50 lines) ==="
        tail -50 "$LOG_FILE" 2>/dev/null || echo "(no log file)"
        exit 1
