name: 'Build Linux .deb Package'
description: 'Build Lemonade .deb package for Linux'
outputs:
  package-name:
    description: 'The name of the generated .deb package file'
    value: ${{ steps.build-deb.outputs.package_name }}
runs:
  using: "composite"
  steps:
    - name: Run setup.sh to configure environment
      shell: bash
      run: |
        set -e

        echo "Running setup.sh to configure build environment..."
        bash setup.sh

        echo "Build environment configured successfully!"

    - name: Refresh debian/changelog
      shell: bash
      run: |
        set -e

        echo "Refreshing debian/changelog with current version..."
        bash debian/update-changelog.sh
        echo "Changelog refreshed successfully!"

    - name: Build .deb package with dpkg-buildpackage
      id: build-deb
      shell: bash
      run: |
        set -e

        echo "Building Lemonade .deb package with dpkg-buildpackage..."

        # Build using dpkg-buildpackage (handles CMake build internally via debian/rules)
        dpkg-buildpackage -us -uc -b

        # Extract version and architecture for package name
        DEB_FILE="lemonade-server_${LEMONADE_VERSION}_amd64.deb"

        echo "Looking for: $DEB_FILE"

        if [ ! -f "../$DEB_FILE" ]; then
            echo "ERROR: .deb package not created!"
            echo "Contents of parent directory:"
            ls -lR ../ | head -50
            exit 1
        fi

        # Show package info
        echo "Package information:"
        dpkg-deb --info "../$DEB_FILE"

        # Copy to build directory for consistency with artifact upload
        cp "../$DEB_FILE" "."

        # Output the package name for subsequent steps
        echo "package_name=$DEB_FILE" >> $GITHUB_OUTPUT
