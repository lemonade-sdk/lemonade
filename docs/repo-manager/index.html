<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>repo-manager</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --panel: #ffffff;
      --panel-2: #f1f4f7;
      --text: #17202a;
      --muted: #647385;
      --line: #d7dde5;
      --accent: #176b87;
      --accent-2: #0f766e;
      --danger: #b42318;
      --warn: #9a5b00;
      --ok: #14743f;
      --shadow: 0 1px 2px rgba(16, 24, 40, 0.06);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html {
      height: 100%;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      height: 100%;
      overflow: hidden;
    }
    button, input, select {
      font: inherit;
    }
    .shell {
      height: 100vh;
      display: grid;
      grid-template-columns: 280px 1fr;
      overflow: hidden;
    }
    aside {
      background: #15202b;
      color: #eef4f8;
      padding: 20px 16px;
      border-right: 1px solid #0c141c;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }
    .brand {
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 4px;
    }
    .repo {
      color: #b9c7d3;
      font-size: 13px;
      word-break: break-word;
    }
    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 18px 0;
    }
    .metric {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 6px;
      padding: 10px;
    }
    .metric strong {
      display: block;
      font-size: 20px;
      line-height: 1.1;
    }
    .metric span {
      color: #b9c7d3;
      font-size: 12px;
    }
    nav {
      display: grid;
      gap: 6px;
      margin-top: 14px;
    }
    .sidebar-stats {
      margin-top: auto;
      padding-top: 18px;
      display: grid;
      gap: 10px;
    }
    .sidebar-stat {
      border-top: 1px solid rgba(255,255,255,0.12);
      padding-top: 10px;
    }
    .sidebar-stat span {
      display: block;
      color: #b9c7d3;
      font-size: 12px;
      margin-bottom: 3px;
    }
    .sidebar-stat strong {
      color: #ffffff;
      font-size: 14px;
      font-weight: 650;
    }
    .sidebar-stat small {
      display: block;
      color: #b9c7d3;
      font-size: 12px;
      margin-top: 3px;
    }
    .nav-button {
      border: 0;
      width: 100%;
      text-align: left;
      color: #dce7ee;
      background: transparent;
      border-radius: 6px;
      padding: 10px 12px;
      cursor: pointer;
    }
    .nav-button.active {
      color: #ffffff;
      background: rgba(255,255,255,0.14);
    }
    main {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: space-between;
    }
    h1 {
      font-size: 20px;
      margin: 0;
      letter-spacing: 0;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .search {
      width: min(420px, 42vw);
      min-width: 220px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: #fff;
    }
    .content {
      min-width: 0;
      min-height: 0;
      padding: 18px 20px 28px;
      overflow: hidden;
    }
    .split {
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(420px, 0.92fr) minmax(360px, 1.08fr);
      gap: 16px;
      align-items: stretch;
    }
    .single {
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      align-items: stretch;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }
    .panel-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .panel-head h2 {
      font-size: 15px;
      margin: 0;
    }
    .table-wrap {
      overflow: auto;
      min-height: 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    th {
      position: sticky;
      top: 0;
      background: var(--panel-2);
      color: #435366;
      font-size: 12px;
      text-transform: uppercase;
      z-index: 1;
    }
    tr {
      cursor: pointer;
    }
    tbody tr:hover {
      background: #f6fafb;
    }
    tbody tr.selected {
      background: #e8f3f6;
    }
    .commit-cell {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      color: #1d5268;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .description {
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .read-toggle {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      border: 1px solid #1f77b4;
      background: transparent;
      padding: 0;
      cursor: pointer;
      vertical-align: middle;
    }
    .read-toggle.unread {
      background: #1f77b4;
    }
    .read-toggle:focus-visible {
      outline: 2px solid #83c5f3;
      outline-offset: 2px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      height: 22px;
      border-radius: 999px;
      padding: 0 8px;
      font-size: 12px;
      font-weight: 650;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .badge.clean, .badge.ready {
      color: var(--ok);
      background: #e9f7ef;
      border-color: #bfe7d0;
    }
    .badge.resolved {
      color: var(--accent-2);
      background: #e6f6f4;
      border-color: #b9e4df;
    }
    .badge.needs-attention {
      color: var(--warn);
      background: #fff5df;
      border-color: #f4d79a;
    }
    .badge.blocker, .badge.blocked {
      color: var(--danger);
      background: #fff0ee;
      border-color: #f4c4bd;
    }
    .detail {
      padding: 16px;
      display: grid;
      gap: 14px;
      align-content: start;
      min-height: 0;
      overflow: auto;
    }
    .kv {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .kv strong {
      color: var(--text);
      font-weight: 600;
    }
    a {
      color: var(--accent);
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .section h3 {
      font-size: 13px;
      text-transform: uppercase;
      color: #435366;
      margin: 0 0 8px;
      letter-spacing: 0;
    }
    .section p {
      margin: 0;
      line-height: 1.5;
    }
    ul {
      margin: 0;
      padding-left: 18px;
    }
    li {
      margin: 4px 0;
      line-height: 1.45;
    }
    .evidence-list {
      display: grid;
      gap: 10px;
    }
    .evidence-item {
      border-left: 3px solid var(--line);
      padding-left: 10px;
    }
    .evidence-item h4 {
      margin: 0 0 4px;
      color: #435366;
      font-size: 12px;
      font-weight: 700;
      text-transform: capitalize;
    }
    .evidence-item p {
      margin: 0;
      line-height: 1.5;
    }
    .muted {
      color: var(--muted);
      font-size: 12px;
    }
    .todo-count {
      color: #27384a;
      font-weight: 650;
      white-space: nowrap;
    }
    .todo-count.done {
      color: var(--muted);
      font-weight: 500;
    }
    .todo-list {
      display: grid;
      gap: 8px;
    }
    .todo-item {
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 9px;
      align-items: start;
      line-height: 1.45;
    }
    .todo-item input {
      margin-top: 2px;
    }
    .todo-item.done span {
      color: var(--muted);
      text-decoration: line-through;
    }
    .priority {
      color: var(--warn);
      font-weight: 700;
      margin-right: 4px;
    }
    pre {
      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.5;
      background: #0f1720;
      color: #e7eef5;
      border-radius: 8px;
      padding: 14px;
      max-height: 100%;
      overflow: auto;
    }
    .empty {
      padding: 18px;
      color: var(--muted);
    }
    .copy {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 6px;
      padding: 7px 10px;
      cursor: pointer;
    }
    .hidden {
      display: none;
    }
    @media (max-width: 980px) {
      body {
        overflow: auto;
      }
      .shell {
        grid-template-columns: 1fr;
        height: auto;
        min-height: 100vh;
        overflow: visible;
      }
      aside {
        position: static;
        overflow: visible;
      }
      main,
      .content {
        overflow: visible;
      }
      .split {
        grid-template-columns: 1fr;
        height: auto;
      }
      .single {
        height: auto;
      }
      .search {
        width: 100%;
      }
    }

`docs/guide/cli.md`) was updated to list `pi` as a supported agent and document its config file behavior. The documentation is thorough and matches the implementation."}}, "evidence": {"review": "PR #2198 received one substantive review from @sawansri who provided inline comments on the documentation and design, suggesting Pi should not modify the user's global settings and should respect the PI_CODING_AGENT_DIR env var. The author (@superm1) engaged with the feedback, iterated on the design (meeting in the middle: populate global config only if the user has no existing config), and incorporated the PI_CODING_AGENT_DIR support. The review discussion resolved the key UX concerns before merging. The PR body is empty, but the inline comments serve as the design rationale.", "post_approval_commits": "No commits were added after the first (and only) approval from @sawansri at 2026-06-11T20:01:11Z. The four commits on the PR were all authored by @superm1 and were all submitted before the approval. The post-approval state is clean.", "tests": "No new unit or integration tests were added for the Pi agent profile code (pi_profile.cpp, pi_profile.h). The feature modifies CLI agent launch behavior and configuration file handling, which are typically tested through the existing CLI test suite. However, no test coverage was added for the new pi-specific paths (pi_has_default_config, sync_pi_settings_file, resolve_pi_agent_dir). The CI test job \"Test API Key (ubuntu-latest)\" failed on the merge commit, but it is unclear whether this is a pre-existing issue or related to this change. The moonshine .deb test also failed independently.", "manual_release_testing": "This PR introduces a new user-facing CLI agent (`lemonade launch pi`) that writes configuration files to the user's home directory and changes the launch UX. This must be tested manually before release: (1) first-time user flow — verify config files are created correctly and Pi launches, (2) existing user flow — verify t  previously used, but the buildWebSocketUrl function without a port argument will use the main server port, which is the same port used for the web UI.", "api_compatibility": "No breaking API changes. The change removes a dependency on the /health endpoint's websocket_port field for the log stream client. The /logs/stream WebSocket endpoint on the main HTTP port was already supported server-side (UpgradableFrontServer in upgradable_http_server.h). The removed /health call is internal to the renderer and does not affect any external API contract.", "security": "No security concerns. The change actually reduces the attack surface by removing an unnecessary /health endpoint call from the renderer. No credential handling, network calls to external services, or permission changes are introduced.", "documentation": "No documentation changes required. This is a bug fix for internal client-side connection logic, not a user-facing feature or API change."}}, "evidence": {"review": "PR #2191 was reviewed and approved by @Geramy (MEMBER) on 2026-06-11T18:12:05Z. The PR was authored by @blackdeathdrow and merged via the merge queue. No inline review comments were left. The review was timely and appropriate for a small bug fix.", "post_approval_commits": "No commits were added after the first and only approval (2026-06-11T18:12:05Z). The PR contained a single commit (5b853a0db50fb0c3d780c38cc5e7adff9e16fb22), which was the same commit that was approved.", "tests": "The author tested the fix locally using lemond on 0.0.0.0:13305 with a Mikrotik reverse proxy and confirmed the log stream connects and receives entries. No automated tests were added, which is reasonable for a UI-side WebSocket connection fix that depends on a reverse proxy environment. No existing tests were weakened or deleted.", "manual_release_testing": "The change affects the log viewer UI component, which is user-visible. However, the fix is a straightforward port change (main HTTP port instead of dedicated WebS ain", "tag_start": "v10.7.0", "pr_number": 2100, "author": "@jeremyfowers", "summary": "Lifts the loopback restriction on /internal/* endpoints and relies on existing admin-key gating, adding a startup warning when binding to a non-loopback host without an API key.", "verdict": "Needs Attention", "verdict_reason": "The /internal/* endpoint security model change has no automated test coverage for the remote-address path and should be manually verified before release.", "maintainer_todos": [{"text": "Manually verify that the startup warning fires correctly on a non-loopback bind with no key set, with only admin key set, and with regular key set."}, {"text": "Confirm the two-key authentication hierarchy (admin key vs regular key) works as documented for remote clients."}], "shout_outs": [], "reviewed_at": "2026-06-10T00:40:36+00:00", "skill_version": "0.1.0", "rubric_version": "commit-review-2026-06-09", "range_start": "v10.6.0", "details": {"repo": "lemonade-sdk/lemonade", "commit_sha": "3d790e472473d7d45198ef64469666bf16462312", "pr_number": 2100, "merge_date": "2026-06-09T19:54:13Z", "summary": "Lifts the loopback restriction on /internal/* endpoints and relies on existing admin-key gating, adding a startup warning when binding to a non-loopback host without an API key.", "author": "@jeremyfowers", "reviewers": ["@fl0rianr"], "shout_outs": [], "verdict": "Needs Attention", "verdict_reason": "The /internal/* endpoint security model change has no automated test coverage for the remote-address path and should be manually verified before release.", "maintainer_todos": [{"text": "Manually verify that the startup warning fires correctly on a non-loopback bind with no key set, with only admin key set, and with regular key set."}, {"text": "Confirm the two-key authentication hierarchy (admin key vs regular key) works as documented for remote clients."}], "evidence": {"review": "PR #2100 was approved by @ramkrishna2910 and @bitgamma (both without comments). @fl0rianr left su  no auth if no keys set). This is a behavioral change, not a contract change. No schema, protocol, or persistence format modification.", "security": "The change intentionally relaxes a network-based access control (loopback restriction) in favor of key-based access control. The security model shifts: operators binding to non-loopback hosts are now responsible for setting an API key. The startup warning (and re-check on host rebind via /internal/set) mitigates the risk of accidental exposure. @fl0rianr correctly identified that the original warning logic suppressed when only LEMONADE_ADMIN_API_KEY was set, leaving inference endpoints unauthenticated — this was fixed. No supply-chain, credential handling, or suspicious code patterns detected.", "documentation": "docs/dev/getting-started.md updated to describe the new remote-access behavior and include a security warning. docs/guide/configuration/README.md expanded to spell out the two-credential model (api_key_ vs admin_api_key_) with a clear authentication hierarchy table and an updated warning about non-loopback binds. Documentation is consistent with the code changes."}}, "evidence": {"review": "PR #2100 was approved by @ramkrishna2910 and @bitgamma (both without comments). @fl0rianr left substantive inline comments flagging that the startup warning logic suppressed when only LEMONADE_ADMIN_API_KEY was set (leaving /api, /v0, /v1 unauthenticated on non-loopback) and that the documentation wording implied either key was sufficient for a secured remote deployment. The author addressed both concerns in follow-up commits before merge. The author is also a maintainer (MEMBER association).", "post_approval_commits": "After @fl0rianr's last comment (2026-06-08T21:04Z), the author pushed commits b71712a (split warning into two paths — no-key vs admin-only), 818734c (reworded warning and documentation to clarify LEMONADE_API_KEY vs LEMONADE_ADMIN_API_KEY roles), and a final commit removing an explanatory comment. These commits directly address the reviewer's feedback and remain within the PR's scope; no problematic post-approval churn detected.", "tests": "The PR author notes manual testing on a LAN IP and states existing admin-key tests in test/server_env_vars.py are unaffected. No automated test for the remote-address path was added (citing flaky CI with routable interfaces). This is a behavioral gap — the new security-relevant path (remote addr + key gating + warning logic) has no test coverage. The skip is arguably justified for CI, but the gap should be acknowledged.", "manual_release_testing": "The /internal/* endpoints (shutdown, set, config, cleanup-cache) now accept remote connections gated by admin-key authentication. This is a significant shipped behavior change with security implications: an operator binding to 0.0.0.0 without a key exposes all control endpoints unauthenticated. The startup warning is new but must be verified to fire in all three key-configuration scenarios (no key, admin-only, regular key). Manual release testing is warranted before the next release.", "api_compatibility": "No breaking API change. The /internal/* endpoints previously returned 403 for non-loopback addresses; they now accept remote connections (with admin-key auth or no auth if no keys set). This is a behavioral change, not a contract change. No schema, protocol, or persistence format modification.", "security": "The change intentionally relaxes a network-based access control (loopback restriction) in favor of key-based access control. The security model shifts: operators binding to non-loopback hosts are now responsible for setting an API key. The startup warning (and re-check on host rebind via /internal/set) mitigates the risk of accidental exposure. @fl0rianr correctly identified that the original warning logic suppressed when only LEMONADE_ADMIN_API_KEY was set, leaving inference endpoints unauthenticated — this was fixed. No supply-chain, credential handling, or suspicious code patter hat improves CI resilience without touching production code, API, or user-visible behavior.", "maintainer_todos": [], "evidence": {"review": "PR #2123 was approved by @jeremyfowers (MEMBER) with 'Thanks for this!' on 2026-06-08T14:09:05Z. The approval covered the final PR commit (da7af6f). No inline review comments were filed. The change is straightforward test infrastructure, and the approval is appropriate for the scope.", "post_approval_commits": "No commits were added after the first (and only) approval. All four PR commits predate the approval, and the merge-queue merge commit is a clean squash-merge with no post-approval churn.", "tests": "The change itself adds test infrastructure: a shared `pull_model_with_retry()` helper in test/utils/server_base.py and a CLI-specific `run_cli_pull_command_with_retry()` in test/server_cli2.py. These helpers are then wired into server_endpoints.py, server_omni.py, and test_llamacpp_system_backend.py. No existing tests were weakened, deleted, or relaxed; the PR explicitly preserves the original assertion behavior while making setup more resilient. CI ran all workflows including C++ Server Build, Test, and Release, CodeQL, Docs And Style, Linux Distro Builds, and Server Download Registry Tests -- all passed.", "manual_release_testing": "Not applicable. This is a test-only change with no production code, no CLI behavior changes, no API changes, and no user-visible behavior. It does not affect the release surface.", "api_compatibility": "Not applicable. No production code, API, config, or contract was changed. Only test utilities and test files were modified.", "security": "No security concerns. The change is confined to test infrastructure. The retry logic uses bounded attempts (3) with exponential backoff capped at 30 seconds, and persistent failures still raise clear AssertionErrors with status/body details. No supply-chain, credential, network, or auth surface is introduced.", "documentation": "Not applicable. This is a test merge_date": "", "reviewers": ["@jeremyfowers"], "review_key": "lemonade-sdk/lemonade|4da594d4ea0f1167497badaa4e6c059d25f990a6|commit-review-2026-06-09", "is_read": true, "todo_items": [], "outstanding_todos": 0, "commit_date": "2026-06-08T14:09:11Z"}, {"repo": "lemonade-sdk/lemonade", "commit_sha": "8ed674eab25fc830bdf64710a9dfc99f2cab05fd", "branch": "main", "tag_start": "v10.7.0", "pr_number": 2084, "author": "@superm1", "summary": "Fixes a path traversal vulnerability in the /web-app/ static asset route by adding path canonicalization and confinement checks, and wires comprehensive regression tests into CI across all platforms.", "verdict": "Needs Attention", "verdict_reason": "One commit was added after the sole approval (removing a brittle SVG test and renumbering), which was a justified response to reviewer feedback but should be confirmed by a maintainer given the security-critical nature of the change.", "maintainer_todos": [{"text": "Confirm that the post-approval test removal (fc746a4, 'Remove brittle test and renumber') was in the spirit of fl0rianr's earlier review feedback and does not weaken the security regression coverage."}], "shout_outs": [{"handle": "@fl0rianr", "reason": "Conducted a thorough multi-round security review: identified the Windows path-separator bug in the initial fix, strengthened the regression tests to assert 403 against a known existing file, caught CI coverage gaps, and identified a brittle hardcoded SVG test that failed on Windows."}], "reviewed_at": "2026-06-09T08:07:38+00:00", "skill_version": "0.1.0", "rubric_version": "commit-review-2026-06-09", "range_start": "v10.6.0", "details": {"repo": "lemonade-sdk/lemonade", "commit_sha": "8ed674eab25fc830bdf64710a9dfc99f2cab05fd", "pr_number": 2084, "summary": "Fixes a path traversal vulnerability in the /web-app/ static asset route by adding path canonicalization and confinement checks, and wires comprehensive regression tests into CI across all platforms.", "author": "@superm1", "shout_outs": [{"handle": "@fl0rianr", "reason": "Conducted a thorough multi-round security review: identified the Windows path-separator bug in the initial fix, strengthened the regression tests to assert 403 against a known existing file, caught CI coverage gaps, and identified a brittle hardcoded SVG test that failed on Windows."}], "verdict": "Needs Attention", "verdict_reason": "One commit was added after the sole approval (removing a brittle SVG test and renumbering), which was a justified response to reviewer feedback but should be confirmed by a maintainer given the security-critical nature of the change.", "maintainer_todos": [{"text": "Confirm that the post-approval test removal (fc746a4, 'Remove brittle test and renumber') was in the spirit of fl0rianr's earlier review feedback and does not weaken the security regression coverage."}], "evidence": {"review": "PR #2084 received a thorough multi-round review from @fl0rianr (COLLABORATOR). Initial review (2026-06-02) requested changes: use std::filesystem::relative instead of string-prefix for Windows compatibility and add regression tests. Second round (2026-06-07) flagged CI coverage gaps and a hardcoded SVG test name mismatch. Third round (2026-06-07) flagged that the hardcoded SVG test was brittle and failed on Windows. Final review (2026-06-07) approved: 'Nice fix, CI in general is still brittle. You can merge this PR now.' The reviewer demonstrated subject-matter expertise in both C++ filesystem semantics and security testing.", "post_approval_commits": "One commit was added after the sole approval (fc746a4, 'Remove brittle test and renumber') at 2026-06-08T00:22:02Z. This commit removed test_002_normal_svg_asset_returns_200 (which hardcoded a hashed SVG filename that was absent on Windows) and renumbered the remaining tests. This was a direct response to fl0rianr's review comment (2026-06-07 18:50 UTC) recommending removal of the brittle test. The change only affected the test file and did not alter the production-side security fix or weaken security regression coverage (the normal asset, traversal, and 404 tests remain).", "tests": "New test file test/server_webapp.py (200 lines) provides comprehensive regression coverage: normal JS asset serving (test_001), /web-app/ prefixed path serving (test_002), URL-encoded traversal to a known existing file asserting 403 specifically (test_003), double-encoded traversal (test_004), backslash traversal (test_005), nonexistent asset returning 404 (test_006), legitimate filenames with '..' substrings allowed (test_007), and a Windows manual validation note (test_008). The CI workflow was updated to run these tests in the always-running Linux (test-cli-endpoints-linux), Windows/macOS (test-cli-endpoints-windows-macos), and macOS unsigned paths. Tests are well-scoped and directly exercise the security fix.", "manual_release_testing": "The /web-app/ route serves static assets for the web application UI. The security fix changes how file paths are resolved and confined. While automated CI tests now cover the key scenarios, manual verification of normal web-app asset loading (renderer.bundle.js, SVG assets) and a traversal attempt against a live release build would provide additional confidence. However, the comprehensive CI coverage and the nature of the fix (confinement check, not behavior change for valid paths) makes this a low-risk area.", "api_compatibility": "No breaking API changes. The /web-app/ route behavior is unchanged for valid paths (200 OK for existing assets, 404 for missing ones). Invalid traversal paths now return 403 instead of potentially leaking files. This is a security hardening that makes the route more restrictive, not a breaking change for legitimate usage.", "security": "This is a critical security fix. The original code concatenated the regex capture group directly onto web_app_dir without canonicalization. cpp-httplib URL-decodes %2f to / and %2e to . before regex matching, enabling GET /web-app/..%2 on script is stdlib-only (no external deps) and supports --dry-run and --priority-only modes for local testing. No existing tests were weakened or deleted; the PR adds entirely new files. The C++ CI failure (Test API Key on windows-latest) is unrelated to these Python/workflow changes.", "manual_release_testing": "This PR does not ship new user-facing behavior or modify the Lemonade server/CLI. It only adds a GitHub Actions workflow and a Python script that runs inside CI and the GitHub issue/PR system. No manual release testing is required for the release.", "api_compatibility": "No user-facing API changes. The PR only adds GitHub labels and a workflow. The advisory-only notice in the workflow header explicitly states these labels must not be used as CI/release/policy gates, which protects against unintended downstream dependencies.", "security": "The workflow uses pull_request_target (appropriate for the event type) with minimal permissions (contents: read, issues: write, pull-requests: write). ANTHROPIC_API_KEY is scoped to the classifier step only. The workflow feeds untrusted issue/PR title/body text into the Anthropic API but applies only advisory labels — the advisory-only notice and label naming convention (engine::, area::, etc.) make it clear these are triage aids, not trust signals. The script uses gh issue edit (not checkout of PR code) so it never executes untrusted code. The permission scope for pull-requests: write is documented with a rationale comment explaining that label-write on PRs requires it even though gh issue edit routes through the issues API.", "documentation": "The Python script includes comprehensive docstrings, the workflow has a detailed header comment explaining the two-pass design and the sticky-priority contract, and the PR description lists all new labels with their creation status. The project's contribute.md and philosophy.md were consulted but do not contain specific reviewer guidelines for automation workflows. The new labels de_server_up, lemonade_loaded_models, lemonade_max_loaded_models, lemonade_model_info), and verifies HEAD support. Uses the prometheus-client Python library's text_string_to_metric_families for schema validation. The prometheus-client dependency was added to test/requirements.txt. No evidence of test weakening.", "manual_release_testing": "The /metrics endpoint is a new user-visible API endpoint and must be manually tested before release. Authentication behavior (API key required when set, accessible without auth when only admin key is set) should be verified. System utilization metrics (memory, GPU, NPU) should be tested on AMD hardware as noted by the author. llama.cpp backend metrics forwarding should be verified with a running server.", "api_compatibility": "The /metrics endpoint is a new root-level route (not under /api/v0/, /api/v1/, /v0/, or /v1/) that requires bearer authentication when LEMONADE_API_KEY is set. The Telemetry struct in wrapped_server.h gains new fields (request_count_total, input_tokens_total, output_tokens_total, prompt_tokens_total) and loses decode_token_times. The Router::update_telemetry and Router::update_prompt_tokens signatures changed to accept a model_name parameter. These are additive/internal changes with no breaking external API impact.", "security": "No security concerns identified. The /metrics endpoint respects API key authentication (same mechanism as other API routes). Network calls to llama.cpp backend metrics use 1-second connection and read timeouts. The /proc/meminfo read on Linux is safe. No credential handling, code execution paths, or supply-chain changes.", "documentation": "Comprehensive. docs/api/lemonade.md includes full /metrics endpoint documentation: authentication behavior, polling/refresh rate explanation, example requests (with and without auth), response format, content type, and a detailed listing of all metric families with HELP/TYPE descriptions. The PR author acknowledged @sbates130272's suggestion to k ormalized map, and flagged the JSON schema inconsistency between single- and multi-model output, driving the author to unify the output shape."}], "reviewed_at": "2026-06-09T07:08:00+00:00", "skill_version": "0.1.0", "rubric_version": "commit-review-2026-06-09", "range_start": "v10.6.0", "details": {"repo": "lemonade-sdk/lemonade", "commit_sha": "20a61038b34a56b7a10c0e2ed7c923eef2205cd0", "pr_number": 2075, "summary": "Adds support for benchmarking multiple models in a single `lemonade bench` command, including model deduplication, per-model JSON timestamps, and improved comparison mode.", "author": "@ckuethe", "shout_outs": [{"handle": "@fl0rianr", "reason": "Identified a design flaw in compare mode where duplicate model names would collapse into a single entry in the normalized map, and flagged the JSON schema inconsistency between single- and multi-model output, driving the author to unify the output shape."}], "verdict": "Needs Attention", "verdict_reason": "The merge is well-reviewed and clean, but the CLI feature changes warrant manual testing before release.", "maintainer_todos": [{"text": "Manually test the multi-model bench command across at least one backend (vulkan or rocm) to verify preflight, deduplication, and comparison mode work correctly with real models."}], "evidence": {"review": "PR #2075 received substantive review from @fl0rianr who identified two edge cases (compare-mode model deduplication collapsing, JSON schema inconsistency between single- and multi-model output). @bitgamma (creator of the bench subsystem per the diff) approved after seeing the follow-up changes. The author iterated on all feedback: added model deduplication, unified JSON output to always emit a `models` array, and clarified docs. The review cycle was thorough and the final state addresses the raised concerns.", "post_approval_commits": "No commits were added after the latest approval. The merge commit 20a6103 is a squash/merge of the PR branch. The post-approval-commits script returned unrelated PRs (#2104, #2105) that landed in the merge queue after this PR, not as part of this PR's changes.", "tests": "No dedicated unit or integration tests were added for the multi-model bench feature. The change touches src/cpp/cli/bench.cpp (456 additions, 122 deletions) and refactors the bench command significantly, but relies on the existing manual benchmark workflow and integration tests for coverage. The CLI change is user-facing and would benefit from at least a basic automated test.", "manual_release_testing": "This is a CLI feature change that modifies the `lemonade bench` command interface (accepts multiple model names), JSON output schema (always emits a `models` array), and comparison mode behavior. Manual release testing is warranted to verify preflight validation, model deduplication messaging, per-model timestamps, and the comparison mode with matched/new/removed models.", "api_compatibility": "The JSON output schema changed: single-model runs now include a top-level `models` array in addition to the existing top-level `timestamp`. This is backward-compatible for consumers that read the `models` array, but tools that expect the legacy single-model top-level shape may need updates. The CLI contract changed from `lemonade bench MODEL_NAME` to `lemonade bench MODEL_NAME [MODEL_NAME ...]`, which is an additive change (positional argument now accepts 1+ values). The `--compare` mode behavior is enhanced but the previous single-model compare still works.", "security": "No security concerns identified. The change is confined to the CLI bench command and does not introduce new network calls, credential handling, or permission changes. Auto-pull of models during preflight uses the existing model download infrastructure.", "documentation": "docs/guide/cli.md was updated comprehensively: the bench command table entry now shows `[MODEL_NAME ...]`, the options section documents the new multi-model argument, preflight behavior, timestamp behavior, model matching behavior in compare mode, and a multi-model example was added. The Co-authored-by line for @bitgamma is present."}}, "evidence": {"review": "PR #2075 received substantive review from @fl0rianr who identified two edge cases (compare-mode model deduplication collapsing, JSON schema inconsistency between single- and multi-model output). @bitgamma (creator of the bench subsystem per the diff) approved after seeing the follow-up changes. The author iterated on all feedback: added model deduplication, unified JSON output to always emit a `models` array, and clarified docs. The review cycle was thorough and the final state addresses the raised concerns.", "post_approval_commits": "No commits were added after the latest approval. The merge commit 20a6103 is a squash/merge of the PR branch. The post-approval-commits script returned unrelated PRs (#2104, #2105) that landed in the merge queue after this PR, not as part of this PR's changes.", "tests": "No dedicated unit or integration tests were added for the multi-model bench feature. The change touches src/cpp/cli/bench.cpp (456 additions, 122 deletions) and refactors the bench command significantly, but relies on the existing manual benchmark workflow and integration tests for coverage. The CLI change is user-facing and would benefit from at least a basic automated test.", "manual_release_testing": "This is a CLI feature change that modifies the `lemonade bench` command interface (accepts multiple model names), JSON output schema (always emits a `models` array), and comparison mode behavior. Manual release testing is warranted to verify preflight validation, model deduplication messaging, per-model timestamps, and the comparison mode with matched/new/removed models.", "api_compatibility": "The JSON output schema changed: single-model runs now include a top-level `models` array in addition to the existing top-level `timestamp`. This is backward-compatible for consumers that read the `models` array, but tools that expect the legacy single-model top-level shape may need updates. The CLI contract changed from `lemonade bench MODEL_NAME` to `lemonade bench MODEL_NAME [MODEL_NAME ...]`, which is an additive change (positional argument now accepts 1+ values). The `--compare` mode behavior is enhanced but the previous single-model compare still works.", "security": "No security concerns identified. The change is confined to the CLI bench command and does not introduce new network calls, credential handling, or permission changes. Auto-pull of models during preflight uses the existing model download infrastructure.", "documentation": "docs/guide/cli.md was updated comprehensively: the bench command table entry now shows `[MODEL_NAME ...]`, the options section documents the new multi-model argument, preflight behavior, timestamp behavior, model matching behavior in compare mode, and a multi-model example was added. The Co-authored-by line for @bitgamma is present."}, "merge_date": "", "reviewers": ["@bitgamma", "@fl0rianr"], "review_key": "lemonade-sdk/lemonade|20a61038b34a56b7a10c0e2ed7c923eef2205cd0|commit-review-2026-06-09", "is_read": true, "todo_items": [{"id": "fda95e0e5f0dea6bf2fa0384949007c6642bff49cc4defdc32c02d15ace3fa0f", "text": "Manually test the multi-model bench command across at least one backend (vulkan or rocm) to verify preflight, deduplication, and comparison mode work correctly with real models.", "priority": null, "completed": true}], "outstanding_todos": 0, "commit_date": "2026-06-05T22:55:19Z"}, {"repo": "lemonade-sdk/lemonade", "commit_sha": "99b43a459f03b4cd05b51bb96befa439ab94bfd3", "branch": "main", "tag_start": "v10.7.0", "pr_number": 2101, "author": "@github-actions[bot]", "summary": "Automated update of llama.cpp backend version hashes across vulkan, cpu, metal, rocm-stable, and rocm-nightly backends.", "verdict": "Clean", "verdict_reason": "This is a routine automated backend version bump with one-line JSON changes, full CI passing, automated val ry that the project already uses. Hash verification covers both SHA256 (for LFS objects) and Git blob SHA1 (for regular files), with proper git-sha1 format handling ('blob \u003csize\u003e\\0' prefix). The mbedTLS dependency is wired via pkg-config with FetchContent fallback, which is a safe approach. No supply-chain or credential concerns.", "documentation": "No documentation changes needed — this is an internal download integrity feature. The backend_versions.json checksum format is self-documenting through the lookup path comments in the code."}}, "evidence": {"review": "PR #1950 received inline review from @superm1 (MEMBER) across multiple rounds, covering SHA implementation design, library choice (OpenSSL vs mbedTLS), and TheRock upstream gap. @jeremyfowers (MEMBER) provided inline review identifying dead code (unused LEMONADE_USE_MBEDTLS_DIGEST define, unused verified_hash field) and approved the PR at 2026-06-01T19:21:30Z. Review was substantive and aligned with project philosophy of treating user-facing errors as bugs.", "post_approval_commits": "One commit (31bc9ec) was added after the first and only approval at 19:21:30Z: 'Drop unused digest verification plumbing' — removes the unused LEMONADE_USE_MBEDTLS_DIGEST compile definition, the verified_hash field from DownloadResult, and its three write sites. This is a pure dead-code cleanup that addresses @jeremyfowers' inline review comments; it does not add behavior, weaken tests, or alter security posture. However, it removes a field from a public-facing struct (http_client.h), which is a minor API surface change.", "tests": "Four new server download tests added (test_003 through test_006) covering real tiny-model download, corrupted GGUF magic redownload, SHA/Git-SHA corruption redownload, and valid cache reuse. Tests are gated behind LEMONADE_RUN_REAL_DOWNLOAD_TESTS=1 and GGUF magic tests behind LEMONADE_RUN_GGUF_MAGIC_TESTS=1, which is appropriate for CI. No evidence of test weakening or deletion.", "manua th volume mounts and environment variables. The ROCm for WSL installation reference link is included."}, "merge_date": "", "reviewers": ["@fl0rianr"], "review_key": "lemonade-sdk/lemonade|faf3428f51648c90049dc3b77525a75ad7a9b019|commit-review-2026-06-09", "is_read": true, "todo_items": [], "outstanding_todos": 0, "commit_date": "2026-05-30T23:01:38Z"}, {"repo": "lemonade-sdk/lemonade", "commit_sha": "10f96c2975ecb80057684fab56e71988efb43b38", "branch": "main", "tag_start": "v10.7.0", "pr_number": 2047, "author": "@noamsto", "summary": "Makes the system cpp-httplib CMake path portable by falling back to the `httplib` pkg-config module name and using a local INTERFACE target for linking, enabling from-source builds on distros that ship header-only cpp-httplib (e.g. Nixpkgs).", "verdict": "Clean", "verdict_reason": "A well-scoped, low-risk build-system fix with thorough CI coverage, clean post-approval history, and substantive reviewer engagement that resolved a tricky CMake portability issue.", "maintainer_todos": [], "shout_outs": [{"handle": "@fl0rianr", "reason": "Diagnosed a subtle build break caused by the author's first revision (IMPORTED_TARGET propagating .pc Cflags that flip cpp-httplib OpenSSL feature macros without -lcrypto) and proposed a concrete, minimal INTERFACE-target fix that resolved the issue."}], "reviewed_at": "2026-06-09T04:27:10+00:00", "skill_version": "0.1.0", "rubric_version": "commit-review-2026-06-09", "range_start": "v10.6.0", "details": {"repo": "lemonade-sdk/lemonade", "commit_sha": "10f96c2975ecb80057684fab56e71988efb43b38", "pr_number": 2047, "summary": "Makes the system cpp-httplib CMake path portable by falling back to the `httplib` pkg-config module name and using a local INTERFACE target for linking, enabling from-source builds on distros that ship header-only cpp-httplib (e.g. Nixpkgs).", "author": "@noamsto", "shout_outs": [{"handle": "@fl0rianr", "reason": "Diagnosed a subtle build break caused by the author's first revision (I .ai/docs/integrations/pi/).\n\n### MTP auto-detection for GGUF models\n\n@blackdeathdrow made it so GGUF models with MTP capability are now auto-detected — no manual config needed. If your model supports it, Lemonade applies the right draft-mtp speculation settings automatically.\n\n## Additional Improvements\n\n- vLLM streaming telemetry now correctly reports token usage, TTFT, and TPS by @superm1\n- VS Code compatibility improved with safer bearer token parsing and model name normalization by @superm1 (with @fl0rianr)\n- Log viewer now works through reverse proxies by @blackdeathdrow\n- Light theme persistence fixed in the GUI by @anditherobot\n- CLI help flags are now grouped by backend for easier discovery by @anditherobot\n- TheRock ROCm support extended to Windows and CUDA support added for NVIDIA GB10 (sm_121) arm64 devices by @anditherobot, @kenvandine, and @superm1\n- CI infrastructure improved: self-hosted runner reliability by @vgodsoe, Windows CI migration to VS 2026 by @jeremyfowers, smoke test cleanup by @fl0rianr, and a new triage dashboard by @ramkrishna2910\n\nFull release notes: https://github.com/lemonade-sdk/lemonade/releases/tag/vNext\n\nHUGE thanks to everyone who contributed — this release wouldn't exist without you :heart:\n", "release_highlights_markdown": "## Headline\n\n- New Moonshine streaming speech-to-text backend with HTTP, TCP, and WebSocket realtime integration.\n- pi.dev is now available as a launchable agent through the `lemonade launch` CLI command.\n- GGUF models with MTP capability are now auto-detected and configured for draft-mtp speculation.\n\n## Breaking Changes\n\n- The `LEMONADE_*` environment variable support has been removed from the `lemonade` CLI; use `--flags` and `lemonade config set` instead."}, {"repo": "lemonade-sdk/lemonade", "branch": "main", "tag_start": "v10.6.0", "head_sha": "7af26f75c0f993a598af0a5191d992f4adf6a51a", "generated_at": "2026-06-11T20:10:00+00:00", "skill_version": "release-announcement-2026-06-09", "range_start": "v10.5.1", "markdown": "## Lemonade v10.6\n\n@everyone we have new fresh Lemonade for you to enjoy this weekend!\n\n### Omni Model Glow Up\n\n@fl0rianr_89165 and I have put a fresh coat of paint on OmniRouter, now simply called **Lemonade Omni Models.**\n\n- Add your own custom omni models in the GUI (File \u003e New Omni Model) and CLI. Full guide [here](https://lemonade-server.ai/docs/guide/configuration/custom-models/#register-an-omni-collection).\n- Upgraded the omni models with Qwen3.6 and MTP, and adopted a new naming scheme called Lemonade Mix (LMX):\n    - **LMX-Omni-52B-Halo** is perfect for high-RAM devices like Strix Halo with Qwen3.6-35B MTP MoE, Flux Klein image editing.\n  - **LMX-Omni-5.5B-Lite** delivers true omni-modality on a RAM budget with Qwen3.5-4B MTP and SD-Turbo image gen.\n\n### Additional Improvements\n\n- Greatly improved download robustness by @fl0rianr_89165 (you can safely close your browser tabs during downloads now!)\n    - This may have fixed thorny issue [1967](https://github.com/lemonade-sdk/lemonade/issues/1976), please let us know!\n- A trio of fixes for Linux by @abn.null , one for macOS by @geramyl, and one for error reporting by neubig \n- Custom downloaded models now show the correct size on disk thanks to @sofiageo and correctly apply the vision and tool-calling labels thanks to @fl0rianr_89165 \n\nCheck out the release notes [here](https://github.com/lemonade-sdk/lemonade/releases/tag/v10.6.0) and a quick screenshot of the omni model refresh below!\n", "release_highlights_markdown": ""}, {"repo": "lemonade-sdk/lemonade", "branch": "main", "tag_start": "v10.5.1", "head_sha": "c5ff980454f5391ba1e893787532030483471064", "generated_at": "2026-06-11T20:09:55+00:00", "skill_version": "release-announcement-2026-06-09", "range_start": "v10.5.0", "markdown": "## Lemonade v10.5.1\n\n@everyone a quick release today to cover two important things:\n\n### MTP is supported out-of-box\n\n`lemonade pull Qwen3.6-27B-MTP-GGUF`\n\nRun it with ROCm 7.13: `lemonade load Qwen3.6-27B-MTP-GGUF --llamacpp rocm`\n\nWe set the llamacpp args for you to make things easy, but you're welcome to override with your own settings.\n\nThanks @sofiageo @mikkoph @geramyl and others for test driving this before release!\n\n### Fedora 43 is back!\n\nThanks @lucifervali for jumping in! Now we support separate RPMs for Fedora 43 and 44, both available on the release page.\n\n### Additional Improvements\n\n- Set args on a per-backend (e.g., vulkan vs. rocm) basis by @mikkoph \n-  Custom model support for stable-diffusion.cpp models by @fl0rianr_89165 \n- We're now on upstream stable-diffusion.cpp + ROCm builds! by @.supermario1 \n\nAnd more, please see the full [release notes](https://github.com/lemonade-sdk/lemonade/releases/tag/v10.5.1)!\n", "release_highlights_markdown": ""}, {"repo": "lemonade-sdk/lemonade", "branch": "main", "tag_start": "v10.7.0", "head_sha": "659807fc3eaa603e6e223b24a2a27dc4b86d7312", "generated_at": "2026-06-11T20:09:54+00:00", "skill_version": "release-announcement-2026-06-09", "range_start": "v10.6.0", "markdown": "## Lemonade v10.7.0\n\n@everyone we have a massive release for you today!\n\n## News\n\nLemonade has a bi-weekly public maintainers meeting now. The last one was June 5, with the notes available [here](https://github.com/lemonade-sdk/lemonade/wiki/Meeting-Notes) and the next one is June 19.\n* We have a real [roadmap](https://lemonade-server.ai/docs/dev/working-groups/) now, focused around 6 areas: omni models, auto-tuning, cross-vendor support, cloud-hybrid usage, remote usage, and overhauling the GUI app.\n* We are moving to a weekly release cadence, each Wednesday morning, starting today!\n\n## Breaking Changes\n\n* The deprecated environment variables for lemond configuration have finally been removed, use `lemonade config` instead.\n* Windows AMD users are highly encouraged to update their Adrenalin driver before generating images.\n\n## Omni Models\n\nLMX-Omni models are now supported in any OpenAI API compatible app that can render multimedia output! Check out the screenshot below. Thanks @fl0rianr_89165 for teaming up to make this a reality!\n\n## Auto Tuning\n\nYou can't optimize what you can't measure. That's why @mikkoph @radiochris @sofiageo and everyone in the working group have introduced the `lemonade bench` command, which provides apples-to-apples LLM benchmarking across llama.cpp, FastFlowLM, vLLM, and Ryzen AI SW. Check it out [here!](https://lemonade-server.ai/docs/guide/cli/#options-for-bench)\n\n## Cross-Vendor Support\n\n@kenvandine @phqen1x @radiochris @fl0rianr_89165 and more are working to give Lemonade excellent support on more platforms. This release brings:\n- llama.cpp CUDA on Windows and Linux, and stable-diffusion.cpp CUDA on Linux\n- stable-diffusion.cpp Vulkan on Windows and Linux\n- build support for non-Apple ARM64 and llama.cpp Vulkan for Adreno GPUs\n\nThis means LMX-Omni models are now GPU accelerated on AMD, Nvidia, Intel, and Apple systems :rocket: \n\n## Additional Improvements\n\nThis release had over 70 contributions from 19 authors and 9 reviewers!\n* Native Promethus metrics endpoint by @storce and @sbates130272\n* WSL ROCm support by @julianxhokaxhiu \n* Greatly improved download experience for models and backends, including SHA checks, by @fl0rianr_89165 \n* Security overhaul (powered by Mythos Preview!) by @.supermario1 @mikkoph @fl0rianr_89165 \n* CI system overhaul by myself and @fl0rianr_89165 to make contributing more fun\n* /internal endpoints now accessible by remote connections by me and `lemonade` CLI available inside of Dockers thanks to @icmpreply87, should make the Docker experience better!\n* So much more, please see the full release notes: https://github.com/lemonade-sdk/lemonade/releases/tag/v10.7.0\n\nHUGE THANK YOU to everyone who contributed and reviewed, you're what makes Lemonade great :heart:\n", "release_highlights_markdown": ""}, {"repo": "lemonade-sdk/lemonade", "branch": "main", "tag_start": "v10.5.0", "head_sha": "5b1937a9d1129eef315ca6660552f1e0672589b7", "generated_at": "2026-06-11T20:09:53+00:00", "skill_version": "release-announcement-2026-06-09", "range_start": "v10.4.0", "markdown": "## Lemonade v10.5\n\nAnother week, another big release @everyone! This one brings ROCm 7.13, full macOS support, and much more.\n\n### :rock: ROCm 7.13\n\nThis is the first \"stable\" release of ROCm based on TheRock and @.supermario1 has brought it to you on day 1!\n\n### :apple: macOS GA\n\nThanks to @geramyl, all major features of Lemonade, including OmniRouter and the embeddable lemond binary, are now available on macOS. Tell your friends to come join the party! \n\n### :brain: Canonical Model IDs\n\nUsers will never see the `user.` anymore and almost never the `extra.` prefix, even when using external software like Open WebUI, Pi, and Hermes. The new naming scheme is documented [here](https://github.com/lemonade-sdk/lemonade/blob/main/docs/guide/configuration/custom-models.md#model-naming-spec).\n\nThank you @.supermario1 @mikkoph @sofiageo @radiochris @.sawan. @b1skit @bitdestroyer @voidwalker1983  for all the feedback that helped us get to a good design here!\n\n### :earth_africa: Global and Per-Model Args\n\nBefore: if you had per-model llama.cpp (or whisper, or vllm, etc.) args they would overwrite your global args. Now they are merged. You can opt-out on a per-model basis.\n\nThank you @mikkoph @avatarh @genrtose @rosemelody254 @fl0rianr_89165 @.sawan. @storm1er for all the work and feedback on this and future improvements in this area!\n\n### Additional Improvements\n\n- Upgrade to FLM v0.9.42 and fix transcription GUI bugs by me, @zane_6_ni, and @mikkoph \n- Easily copy canonical model IDs from the Model Options GUI by @fl0rianr_89165 \n- vLLM and `lemonade launch` refinements by @.sawan. and SorenDreano\n- Bug fixes by @tetramatr1x, @meghsat5310, and Gunnar\n\n### Breaking changes\n\n- `room-preview` has been deprecated because TheRock is now stable! You will be auto-migrated from `rocm-preview` to `rocm-stable`\n- `audio` has been renamed to `transcription` in the `/v1//health` endpoint\n- If you have `*.args` set in the global config and `*_args` set for a specific model, these options will be merged at load time. Previously, per-model args would completely replace global args. You can opt-out on a per-model basis by setting `merge_args=False` in a load request and/or saved model options.\n\nSpecial should out to @fl0rianr_89165 who gave a lot of great advice and feedback this cycle. Appreciate you!\n\nSee the [full release notes](https://github.com/lemonade-sdk/lemonade/releases/tag/v10.5.0)\n", "release_highlights_markdown": ""}]};</script>

<body>
  <div class="shell">
    <aside>
      <div class="brand">repo-manager</div>
      <div class="repo" id="repo-name"></div>
      <div class="metrics">
        <div class="metric"><strong id="metric-commits">0</strong><span>commit reviews</span></div>
        <div class="metric"><strong id="metric-unread">0</strong><span>unread reviews</span></div>
        <div class="metric"><strong id="metric-todos">0</strong><span>open to-dos</span></div>
      </div>
      <nav>
        <button class="nav-button active" data-view="commits">Commit DB</button>
        <button class="nav-button" data-view="release">Release Review</button>
        <button class="nav-button" data-view="announcement">Announcement</button>
      </nav>
      <div class="sidebar-stats">
        <div class="sidebar-stat"><span>Contributions</span><strong id="stat-contributions">0</strong></div>
        <div class="sidebar-stat"><span>Unique authors</span><strong id="stat-authors">0</strong></div>
        <div class="sidebar-stat"><span>Unique reviewers</span><strong id="stat-reviewers">0</strong></div>
        <div class="sidebar-stat"><span>Date range</span><strong id="stat-days">No reviews</strong><small id="stat-dates"></small></div>
      </div>
    </aside>
    <main>
      <header>
        <h1 id="view-title">Commit DB</h1>
        <div class="toolbar">
          <select class="search" id="tag-select" aria-label="Release tag"></select>
          <input class="search" id="search" placeholder="Filter commits, verdicts, authors, descriptions">
          <button class="copy hidden" id="copy-announcement">Copy announcement</button>
        </div>
      </header>
      <section class="content">
        <div id="view-commits" class="split">
          <section class="panel">
            <div class="panel-head"><h2>Saved Commit Reviews</h2><span class="muted" id="commit-count"></span></div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th style="width: 42px;"></th>
                    <th style="width: 48px;">#</th>
                    <th style="width: 132px;">Commit</th>
                    <th style="width: 150px;">Verdict</th>
                    <th style="width: 92px;">To-Dos</th>
                    <th>Description</th>
                    <th style="width: 130px;">Author</th>
                  </tr>
                </thead>
                <tbody id="commit-rows"></tbody>
              </table>
            </div>
          </section>
          <section class="panel">
            <div class="panel-head"><h2>Commit Review</h2><span class="muted" id="commit-selected"></span></div>
            <div class="detail" id="commit-detail"></div>
          </section>
        </div>

        <div id="view-release" class="single hidden">
          <section class="panel">
            <div class="panel-head"><h2>Release-Level Review</h2></div>
            <div class="detail" id="release-detail"></div>
          </section>
        </div>

        <div id="view-announcement" class="single hidden">
          <section class="panel">
            <div class="panel-head"><h2>Announcement</h2></div>
            <div class="detail" id="announcement-detail"></div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script>
    const isStatic = Boolean(window.REPO_MANAGER_STATIC);
    const state = {
      data: null,
      view: "commits",
      selectedTag: "",
      selectedCommit: 0,
      selectedRelease: 0,
      selectedAnnouncement: 0,
      filter: "",
      route: {}
    };
    let suppressRouteUpdate = false;
    const $ = (id) => document.getElementById(id);

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[ch]));
    }

    function badge(value) {
      const cls = String(value || "unknown").toLowerCase().replace(/\s+/g, "-");
      return `<span class="badge ${cls}">${esc(value || "Unknown")}</span>`;
    }

    function shortSha(value) {
      return String(value || "").slice(0, 10);
    }

    function parseRoute() {
      const rawHash = window.location.hash.startsWith("#") ? window.location.hash.slice(1) : "";
      const params = new URLSearchParams(rawHash || window.location.search.slice(1));
      const view = params.get("view");
      return {
        view: ["commits", "release", "announcement"].includes(view) ? view : "",
        tag: params.get("tag") || "",
        commit: params.get("commit") || "",
        releaseHead: params.get("releaseHead") || "",
        announcementHead: params.get("announcementHead") || ""
      };
    }

    function applyRouteFromUrl() {
      const route = parseRoute();
      state.route = route;
      if (!route.view && route.commit) route.view = "commits";
      if (!route.view && route.releaseHead) route.view = "release";
      if (!route.view && route.announcementHead) route.view = "announcement";
      if (state.data && route.commit && !route.tag) {
        const row = (state.data.commit_reviews || []).find((item) => matchSha(item.commit_sha, route.commit));
        if (row && row.tag_start) route.tag = row.tag_start;
      }
      if (state.data && route.releaseHead && !route.tag) {
        const row = (state.data.release_reviews || []).find((item) => matchSha(item.head_sha, route.releaseHead));
        if (row && row.tag_start) route.tag = row.tag_start;
      }
      if (state.data && route.announcementHead && !route.tag) {
        const row = (state.data.release_announcements || []).find((item) => matchSha(item.head_sha, route.announcementHead));
        if (row && row.tag_start) route.tag = row.tag_start;
      }
      if (route.view) state.view = route.view;
      if (route.tag) state.selectedTag = route.tag;
    }

    function updateRoute() {
      if (suppressRouteUpdate || !state.data) return;
      const params = new URLSearchParams();
      params.set("view", state.view);
      if (state.selectedTag) params.set("tag", state.selectedTag);
      if (state.view === "commits") {
        const row = filteredCommits()[state.selectedCommit] || filteredCommits()[0];
        if (row && row.commit_sha) params.set("commit", row.commit_sha);
      } else if (state.view === "release") {
        const row = filteredReleases()[state.selectedRelease] || filteredReleases()[0];
        if (row && row.head_sha) params.set("releaseHead", row.head_sha);
      } else if (state.view === "announcement") {
        const row = filteredAnnouncements()[state.selectedAnnouncement] || filteredAnnouncements()[0];
        if (row && row.head_sha) params.set("announcementHead", row.head_sha);
      }
      const next = `#${params.toString()}`;
      if (window.location.hash !== next) {
        history.replaceState(null, "", next);
      }
    }

    function matchSha(value, target) {
      if (!value || !target) return false;
      const full = String(value).toLowerCase();
      const wanted = String(target).toLowerCase();
      return full === wanted || full.startsWith(wanted);
    }

    function scrollSelected(root) {
      requestAnimationFrame(() => {
        const selected = root.querySelector(".selected");
        if (selected) selected.scrollIntoView({ block: "nearest" });
      });
    }

    function asList(items) {
      if (!items || !items.length) return `<p class="muted">None.</p>`;
      return `<ul>${items.map((item) => {
        if (typeof item === "string") return `<li>${esc(item)}</li>`;
        const priority = item.priority ? `${esc(item.priority)}: ` : "";
        const handle = item.handle ? `${esc(item.handle)}: ` : "";
        return `<li>${priority}${handle}${esc(item.text || item.reason || JSON.stringify(item))}</li>`;
      }).join("")}</ul>`;
    }

    function evidenceList(evidence) {
      const entries = Object.entries(evidence || {}).filter(([, value]) => value);
      if (!entries.length) return `<p class="muted">No evidence recorded.</p>`;
      return `<div class="evidence-list">${entries.map(([key, value]) => `
        <div class="evidence-item">
          <h4>${esc(key.replaceAll("_", " "))}</h4>
          <p>${esc(value)}</p>
        </div>
      `).join("")}</div>`;
    }

    function todoCount(row) {
      const total = (row.todo_items || []).length;
      const completed = total - (row.outstanding_todos || 0);
      if (!total) return `<span class="todo-count done">0</span>`;
      return `<span class="todo-count ${completed === total ? "done" : ""}">${completed}/${total}</span>`;
    }

    function displayVerdict(row) {
      const total = (row.todo_items || []).length;
      if (total > 0 && (row.outstanding_todos || 0) === 0) {
        return "Resolved";
      }
      return row.verdict;
    }

    function todoList(items) {
      if (!items || !items.length) return `<p class="muted">None.</p>`;
      return `<div class="todo-list">${items.map((item) => `
        <label class="todo-item ${item.completed ? "done" : ""}">
          <input type="checkbox" data-todo-id="${esc(item.id)}" ${item.completed ? "checked" : ""} ${isStatic ? "disabled" : ""}>
          <span>${item.priority ? `<span class="priority">${esc(item.priority)}</span>` : ""}${esc(item.text)}</span>
        </label>
      `).join("")}</div>`;
    }

    async function setTodo(todoId, completed) {
      if (isStatic) return;
      const response = await fetch("/api/todo", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ todo_id: todoId, completed })
      });
      if (!response.ok) {
        const text = await response.text();
        throw new Error(text || "Failed to update to-do");
      }
      await reloadData();
    }

    async function setReadState(reviewKey, isRead) {
      if (isStatic) return;
      const response = await fetch("/api/read", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ review_key: reviewKey, is_read: isRead })
      });
      if (!response.ok) {
        const text = await response.text();
        throw new Error(text || "Failed to update read status");
      }
      await reloadData();
    }

    async function reloadData() {
      if (isStatic) {
        state.data = window.REPO_MANAGER_STATIC_DATA || {};
        applyRouteFromUrl();
        renderAll();
        return;
      }
      const response = await fetch("/api/data");
      state.data = await response.json();
      applyRouteFromUrl();
      renderAll();
    }

    function attachTodoHandlers(root) {
      if (isStatic) return;
      root.querySelectorAll("input[data-todo-id]").forEach((checkbox) => {
        checkbox.addEventListener("change", async () => {
          checkbox.disabled = true;
          try {
            await setTodo(checkbox.dataset.todoId, checkbox.checked);
          } catch (error) {
            checkbox.checked = !checkbox.checked;
            checkbox.disabled = false;
            alert(error.message);
          }
        });
      });
    }

    function section(title, body) {
      return `<div class="section"><h3>${esc(title)}</h3>${body}</div>`;
    }

    function field(label, value) {
      return `<div class="kv"><span>${esc(label)}</span><strong>${esc(value || "")}</strong></div>`;
    }

    function linkedField(label, href, value) {
      if (!href || !value) return field(label, value);
      return `<div class="kv"><span>${esc(label)}</span><strong><a href="${esc(href)}" target="_blank" rel="noopener noreferrer">${esc(value)}</a></strong></div>`;
    }

    function filteredCommits() {
      const rows = state.data.commit_reviews || [];
      const query = state.filter.trim().toLowerCase();
      const tagged = state.selectedTag ? rows.filter((row) => row.tag_start === state.selectedTag) : rows;
      if (!query) return tagged;
      return tagged.filter((row) => [
        row.commit_sha, row.verdict, row.summary, row.author, row.verdict_reason, row.tag_start, row.branch
      ].join(" ").toLowerCase().includes(query));
    }

    function filteredReleases() {
      const rows = state.data.release_reviews || [];
      return state.selectedTag ? rows.filter((row) => row.tag_start === state.selectedTag) : rows;
    }

    function filteredAnnouncements() {
      const rows = state.data.release_announcements || [];
      return state.selectedTag ? rows.filter((row) => row.tag_start === state.selectedTag) : rows;
    }

    function renderShell() {
      const data = state.data;
      const tags = data.tags || [];
      if (state.selectedTag && !tags.includes(state.selectedTag)) {
        state.selectedTag = "";
      }
      if (!state.selectedTag && tags.length) {
        state.selectedTag = tags[0];
      }
      $("tag-select").innerHTML = tags.length ? tags.map((tag) => `<option value="${esc(tag)}" ${tag === state.selectedTag ? "selected" : ""}>${esc(tag)}</option>`).join("") : `<option value="">No tags</option>`;
      const commits = filteredCommits();
      const releases = filteredReleases();
      const announcements = filteredAnnouncements();
      $("repo-name").textContent = `${data.config.repo} · ${data.config.branch || "main"}`;
      $("metric-commits").textContent = commits.length;
      $("metric-unread").textContent = commits.filter((row) => !row.is_read).length;
      $("metric-todos").textContent = commits.reduce((sum, row) => sum + (row.outstanding_todos || 0), 0) + releases.reduce((sum, row) => sum + (row.outstanding_todos || 0), 0);
      $("stat-contributions").textContent = commits.length;
      $("stat-authors").textContent = new Set(commits.map((row) => row.author).filter(Boolean)).size;
      $("stat-reviewers").textContent = new Set(commits.flatMap((row) => row.reviewers || [])).size;
      const range = dateRange(commits);
      $("stat-days").textContent = range.start && range.end ? `${range.days} days` : "No reviews";
      $("stat-dates").textContent = range.start && range.end ? `${range.start} to ${range.end}` : "";
    }

    function dateRange(rows) {
      const dates = rows.map((row) => row.merge_date || row.commit_date || row.reviewed_at).filter(Boolean).map((value) => new Date(value)).filter((date) => !Number.isNaN(date.getTime()));
      if (!dates.length) return {};
      const start = new Date(Math.min(...dates));
      const end = new Date(Math.max(...dates));
      const dayMs = 24 * 60 * 60 * 1000;
      return {
        start: start.toISOString().slice(0, 10),
        end: end.toISOString().slice(0, 10),
        days: Math.floor((Date.UTC(end.getUTCFullYear(), end.getUTCMonth(), end.getUTCDate()) - Date.UTC(start.getUTCFullYear(), start.getUTCMonth(), start.getUTCDate())) / dayMs) + 1
      };
    }

    function renderCommits() {
      const rows = filteredCommits();
      if (state.route.commit) {
        const routedIndex = rows.findIndex((row) => matchSha(row.commit_sha, state.route.commit));
        if (routedIndex !== -1) {
          state.selectedCommit = routedIndex;
        }
      }
      if (rows.length) {
        state.selectedCommit = Math.min(state.selectedCommit, rows.length - 1);
      }
      $("commit-count").textContent = `${rows.length} shown`;
      $("commit-rows").innerHTML = rows.map((row, index) => `
        <tr data-index="${index}" class="${index === state.selectedCommit ? "selected" : ""}">
          <td><button class="read-toggle ${row.is_read ? "read" : "unread"}" data-review-key="${esc(row.review_key)}" data-is-read="${row.is_read ? "true" : "false"}" title="${row.is_read ? "Read" : "Unread"}" aria-label="${row.is_read ? "Read" : "Unread"}" ${isStatic ? "disabled" : ""}></button></td>
          <td>${index + 1}</td>
          <td class="commit-cell" title="${esc(row.commit_sha)}">${esc(shortSha(row.commit_sha))}</td>
          <td>${badge(displayVerdict(row))}</td>
          <td>${todoCount(row)}</td>
          <td><div class="description">${esc(row.summary)}</div></td>
          <td>${esc(row.author || "")}</td>
        </tr>
      `).join("");
      scrollSelected($("commit-rows"));
      $("commit-rows").querySelectorAll("tr").forEach((tr) => {
        tr.addEventListener("click", async () => {
          const index = Number(tr.dataset.index);
          state.selectedCommit = index;
          state.route = {};
          const selected = rows[index];
          if (!isStatic && selected && !selected.is_read) {
            updateRoute();
            await setReadState(selected.review_key, true);
            return;
          }
          renderCommits();
          updateRoute();
        });
      });
      if (!isStatic) {
        $("commit-rows").querySelectorAll(".read-toggle").forEach((button) => {
          button.addEventListener("click", async (event) => {
            event.stopPropagation();
            button.disabled = true;
            try {
              await setReadState(button.dataset.reviewKey, button.dataset.isRead !== "true");
            } catch (error) {
              button.disabled = false;
              alert(error.message);
            }
          });
        });
      }
      const row = rows[state.selectedCommit] || rows[0];
      if (!row) {
        $("commit-detail").innerHTML = `<div class="empty">No commit reviews saved yet.</div>`;
        $("commit-selected").textContent = "";
        return;
      }
      $("commit-selected").textContent = shortSha(row.commit_sha);
      const evidence = row.evidence || {};
      const prUrl = row.pr_number ? `https://github.com/${state.data.config.repo}/pull/${row.pr_number}` : "";
      $("commit-detail").innerHTML = [
        field("Commit", row.commit_sha),
        linkedField("PR", prUrl, row.pr_number ? `#${row.pr_number}` : ""),
        field("Author", row.author),
        row.merge_date ? field("Merged", row.merge_date) : "",
        field("Audited", row.reviewed_at),
        section("Description", `<p>${esc(row.summary)}</p>`),
        section("Verdict", `<p>${badge(displayVerdict(row))} ${esc(row.verdict_reason || "")}</p>`),
        section("Maintainer To-Do", todoList(row.todo_items)),
        section("Shout Outs", asList(row.shout_outs)),
        section("Evidence", evidenceList(evidence))
      ].join("");
      attachTodoHandlers($("commit-detail"));
    }

    function renderRelease() {
      const rows = filteredReleases();
      if (state.route.releaseHead) {
        const routedIndex = rows.findIndex((row) => matchSha(row.head_sha, state.route.releaseHead));
        if (routedIndex !== -1) {
          state.selectedRelease = routedIndex;
        }
      }
      if (rows.length) {
        state.selectedRelease = Math.min(state.selectedRelease, rows.length - 1);
      }
      const row = rows[state.selectedRelease] || rows[0];
      if (!row) {
        $("release-detail").innerHTML = `<div class="empty">Run <code>repo-manager release-review TAG</code> to create one.</div>`;
        return;
      }
      const details = row.details || {};
      $("release-detail").innerHTML = [
        field("Repo", row.repo),
        field("Release", row.tag_start),
        row.range_start ? field("Since", row.range_start) : "",
        field("Head", row.head_sha),
        field("Audited", row.reviewed_at),
        section("Verdict", `<p>${badge(displayVerdict(row))} ${esc(details.verdict_reason || row.verdict_reason || "")}</p>`),
        section("Prioritized To-Do", todoList(row.todo_items)),
        section("Evidence", evidenceList(details.evidence))
      ].join("");
      attachTodoHandlers($("release-detail"));
    }

    function renderAnnouncement() {
      const rows = filteredAnnouncements();
      if (state.route.announcementHead) {
        const routedIndex = rows.findIndex((row) => matchSha(row.head_sha, state.route.announcementHead));
        if (routedIndex !== -1) {
          state.selectedAnnouncement = routedIndex;
        }
      }
      if (rows.length) {
        state.selectedAnnouncement = Math.min(state.selectedAnnouncement, rows.length - 1);
      }
      const row = rows[state.selectedAnnouncement] || rows[0];
      if (!row) {
        $("announcement-detail").innerHTML = `<div class="empty">Run <code>repo-manager announce TAG</code> to create an announcement.</div>`;
        return;
      }
      $("announcement-detail").innerHTML = [
        field("Release", row.tag_start),
        row.range_start ? field("Since", row.range_start) : "",
        field("Head", row.head_sha),
        field("Generated", row.generated_at),
        section("Website Release Highlights", `<pre id="release-highlights-markdown">${esc(row.release_highlights_markdown || "No website release highlights artifact saved.")}</pre>`),
        section("Discord Markdown", `<pre id="announcement-markdown">${esc(row.markdown || "")}</pre>`)
      ].join("");
    }

    function setView(view) {
      state.view = view;
      document.querySelectorAll(".nav-button").forEach((button) => button.classList.toggle("active", button.dataset.view === view));
      $("view-commits").classList.toggle("hidden", view !== "commits");
      $("view-release").classList.toggle("hidden", view !== "release");
      $("view-announcement").classList.toggle("hidden", view !== "announcement");
      $("search").classList.toggle("hidden", view !== "commits");
      $("copy-announcement").classList.toggle("hidden", view !== "announcement");
      $("view-title").textContent = view === "commits" ? "Commit DB" : view === "release" ? "Release Review" : "Announcement";
      updateRoute();
    }

    function renderAll() {
      renderShell();
      renderCommits();
      renderRelease();
      renderAnnouncement();
      setView(state.view);
    }

    document.querySelectorAll(".nav-button").forEach((button) => {
      button.addEventListener("click", () => {
        state.route = {};
        setView(button.dataset.view);
      });
    });
    $("search").addEventListener("input", (event) => {
      state.filter = event.target.value;
      state.selectedCommit = 0;
      state.route = {};
      renderCommits();
      updateRoute();
    });
    $("tag-select").addEventListener("change", (event) => {
      state.selectedTag = event.target.value;
      state.selectedCommit = 0;
      state.selectedRelease = 0;
      state.selectedAnnouncement = 0;
      state.route = {};
      renderAll();
    });
    $("copy-announcement").addEventListener("click", async () => {
      const markdown = $("announcement-markdown");
      await navigator.clipboard.writeText(markdown ? markdown.textContent : "");
      $("copy-announcement").textContent = "Copied";
      setTimeout(() => $("copy-announcement").textContent = "Copy announcement", 1000);
    });
    window.addEventListener("hashchange", () => {
      if (!state.data) return;
      suppressRouteUpdate = true;
      applyRouteFromUrl();
      renderAll();
      suppressRouteUpdate = false;
    });

    reloadData()
      .catch((error) => {
        document.body.innerHTML = `<div class="empty">Failed to load repo-manager data: ${esc(error.message)}</div>`;
      });
  </script>
</body>
</html>
