# Base package defaults live here.
# Put local overrides in /etc/lemonade/conf.d/*.conf so they stay separate from
# the package-provided file.

# Service defaults when unset
#LEMONADE_HOST=localhost
#LEMONADE_PORT=8000
#LEMONADE_LOG_LEVEL=info
#LEMONADE_GLOBAL_TIMEOUT=300
#LEMONADE_EXTRA_MODELS_DIR=
#LEMONADE_MAX_LOADED_MODELS=1

# Backend selection defaults to the first supported backend detected on this system.
# Leave these unset unless you want to force a specific backend.
#LEMONADE_LLAMACPP=
#LEMONADE_SDCPP=
#LEMONADE_WHISPERCPP=

# Model and recipe defaults when unset
#LEMONADE_CTX_SIZE=4096
#LEMONADE_LLAMACPP_ARGS=
#LEMONADE_FLM_ARGS=
#LEMONADE_STEPS=20
#LEMONADE_CFG_SCALE=7.0
#LEMONADE_WIDTH=512
#LEMONADE_HEIGHT=512

# Feature flags default to off/disabled when unset
#LEMONADE_DISABLE_MODEL_FILTERING=0
#LEMONADE_ENABLE_DGPU_GTT=0
#LEMONADE_LLAMACPP_PREFER_SYSTEM=0
#LEMONADE_NO_BROADCAST=0
#LEMONADE_FLM_LINUX_BETA=0

# Backend path overrides default to auto-detect when unset
#LEMONADE_LLAMACPP_ROCM_BIN=
#LEMONADE_LLAMACPP_VULKAN_BIN=
#LEMONADE_LLAMACPP_CPU_BIN=
#LEMONADE_WHISPERCPP_CPU_BIN=
#LEMONADE_WHISPERCPP_NPU_BIN=
#LEMONADE_RYZENAI_SERVER_BIN=
#LEMONADE_KOKORO_CPU_BIN=
#LEMONADE_SDCPP_CPU_BIN=
#LEMONADE_SDCPP_ROCM_BIN=
#LEMONADE_SDCPP_VULKAN_BIN=
